version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: parttime-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: always
    networks:
      - parttime-network

  grafana:
    image: grafana/grafana:9.5.2
    container_name: parttime-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: always
    depends_on:
      - prometheus
    networks:
      - parttime-network

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: parttime-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: always
    networks:
      - parttime-network

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: parttime-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: always
    networks:
      - parttime-network

  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    container_name: parttime-mysql-exporter
    ports:
      - "9104:9104"
    environment:
      - DATA_SOURCE_NAME=root:${MYSQL_ROOT_PASSWORD}@(mysql:3306)/
    restart: always
    depends_on:
      - mysql
    networks:
      - parttime-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.50.0
    container_name: parttime-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: always
    depends_on:
      - redis
    networks:
      - parttime-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:v0.11.0
    container_name: parttime-nginx-exporter
    ports:
      - "9113:9113"
    command:
      - '-nginx.scrape-uri=http://nginx/nginx_status'
    restart: always
    depends_on:
      - nginx
    networks:
      - parttime-network

  uptime-kuma:
    image: louislam/uptime-kuma:1.23.0
    container_name: parttime-uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    restart: always
    networks:
      - parttime-network

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  alertmanager-data:
    driver: local
  uptime-kuma-data:
    driver: local

networks:
  parttime-network:
    external: true