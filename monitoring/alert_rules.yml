groups:
  - name: system_alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) >= 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU使用率过高"
          description: "实例 {{ $labels.instance }} CPU使用率达到 {{ $value }}%，持续超过5分钟"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 >= 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "实例 {{ $labels.instance }} 内存使用率达到 {{ $value }}%，持续超过5分钟"

      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_avail_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} * 100 >= 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "磁盘使用率过高"
          description: "实例 {{ $labels.instance }} 磁盘使用率达到 {{ $value }}%，持续超过5分钟"

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "服务不可用"
          description: "服务 {{ $labels.job }} 实例 {{ $labels.instance }} 已停止运行"

  - name: mysql_alerts
    rules:
      - alert: MySQLDown
        expr: mysql_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MySQL服务不可用"
          description: "MySQL服务已停止运行"

      - alert: MySQLHighConnections
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections * 100 >= 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL连接数过高"
          description: "MySQL连接数达到 {{ $value }}% 上限"

      - alert: MySQLSlowQueries
        expr: rate(mysql_global_status_slow_queries[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MySQL慢查询过多"
          description: "最近5分钟慢查询数量达到 {{ $value }} 次"

  - name: redis_alerts
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis服务不可用"
          description: "Redis服务已停止运行"

      - alert: RedisHighMemoryUsage
        expr: redis_used_memory / redis_maxmemory * 100 >= 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis内存使用率过高"
          description: "Redis内存使用率达到 {{ $value }}%"

      - alert: RedisHighConnections
        expr: redis_connected_clients >= 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis连接数过高"
          description: "Redis连接数达到 {{ $value }} 个"

  - name: elasticsearch_alerts
    rules:
      - alert: ElasticsearchDown
        expr: elasticsearch_cluster_health_status{color="red"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Elasticsearch集群异常"
          description: "Elasticsearch集群状态为红色"

      - alert: ElasticsearchYellowStatus
        expr: elasticsearch_cluster_health_status{color="yellow"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elasticsearch集群状态警告"
          description: "Elasticsearch集群状态为黄色"

      - alert: ElasticsearchHighHeapUsage
        expr: elasticsearch_jvm_memory_used_bytes{area="heap"} / elasticsearch_jvm_memory_max_bytes{area="heap"} * 100 >= 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elasticsearch堆内存使用率过高"
          description: "堆内存使用率达到 {{ $value }}%"

  - name: application_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) * 100 >= 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "应用错误率过高"
          description: "服务 {{ $labels.job }} 错误率达到 {{ $value }}%"

      - alert: HighResponseTime
        expr: avg(rate(http_server_requests_seconds_sum[5m]) / rate(http_server_requests_seconds_count[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "接口响应时间过长"
          description: "服务 {{ $labels.job }} 平均响应时间超过2秒"

      - alert: HighActiveThreads
        expr: jvm_threads_states_threads{state="runnable"} >= 200
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "活跃线程数过高"
          description: "服务 {{ $labels.job }} 活跃线程数达到 {{ $value }} 个"

      - alert: DatabaseConnectionPoolExhausted
        expr: hikaricp_connections_active / hikaricp_connections_max * 100 >= 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接池耗尽"
          description: "服务 {{ $labels.job }} 数据库连接池使用率达到 {{ $value }}%"