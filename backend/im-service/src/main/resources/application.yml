server:
  port: 8084

spring:
  application:
    name: im-service
  datasource:
    url: jdbc:mysql://localhost:3307/parttime_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD:parttime@2024}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

websocket:
  heartbeat-interval: 30000
  max-heartbeat-failures: 3
  max-unread-messages: 50

tencent:
  cloud:
    secret-id: ${TENCENT_CLOUD_SECRET_ID:}
    secret-key: ${TENCENT_CLOUD_SECRET_KEY:}