server:
  port: 8080

spring:
  application:
    name: gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cloud:
    gateway:
      globalcors:
        enabled: false
      routes:
        - id: auth-route
          uri: http://localhost:8081
          predicates:
            - Path=/v1/auth/**
          filters:
            - StripPrefix=0

        - id: student-job-route
          uri: http://localhost:8082
          predicates:
            - Path=/v1/student/job/**
          filters:
            - StripPrefix=0

        - id: complaint-route
          uri: http://localhost:8087
          predicates:
            - Path=/v1/complaint/**,/v1/student/complaint/**,/v1/student/feedback/**,/uploads/complaint/**
          filters:
            - StripPrefix=0

        - id: student-route
          uri: http://localhost:8081
          predicates:
            - Path=/v1/student/**
          filters:
            - StripPrefix=0

        - id: pc-enterprise-job-route
          uri: http://localhost:8082
          predicates:
            - Path=/v1/pc/enterprise/job/**
          filters:
            - StripPrefix=0

        - id: enterprise-api-route
          uri: http://localhost:8081
          predicates:
            - Path=/v1/enterprise/api/**,/v1/enterprise/auth/**,/v1/enterprise/profile/**
          filters:
            - StripPrefix=0

        - id: safety-route
          uri: http://localhost:8081
          predicates:
            - Path=/v1/safety/**
          filters:
            - StripPrefix=0

        - id: public-route
          uri: http://localhost:8082
          predicates:
            - Path=/v1/public/**
          filters:
            - StripPrefix=0

        - id: job-route
          uri: http://localhost:8082
          predicates:
            - Path=/v1/job/**
          filters:
            - StripPrefix=0

        - id: match-route
          uri: http://localhost:8083
          predicates:
            - Path=/v1/match/**
          filters:
            - StripPrefix=0

        - id: im-route
          uri: http://localhost:8084
          predicates:
            - Path=/v1/im/**
          filters:
            - StripPrefix=0

        - id: task-route
          uri: http://localhost:8085
          predicates:
            - Path=/v1/task/**
          filters:
            - StripPrefix=0

        - id: payment-route
          uri: http://localhost:8086
          predicates:
            - Path=/v1/payment/**
          filters:
            - StripPrefix=0

        - id: notification-route
          uri: http://localhost:8088
          predicates:
            - Path=/v1/notification/**
          filters:
            - StripPrefix=0

        - id: admin-route
          uri: http://localhost:8089
          predicates:
            - Path=/v1/pc/admin/**
          filters:
            - StripPrefix=0

        - id: data-route
          uri: http://localhost:8090
          predicates:
            - Path=/v1/pc/data/**
          filters:
            - StripPrefix=0

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}
    timeout: 10000ms

jwt:
  secret: ${JWT_SECRET:parttime-platform-jwt-secret-2024}

rate-limit:
  public-api:
    max-requests: 200
    time-window: 60000
  core-api:
    max-requests: 100
    time-window: 60000
  admin-api:
    max-requests: 50
    time-window: 60000

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://localhost:5174
    - https://miniapp.parttime-cs.com
    - https://h5.parttime-cs.com

logging:
  level:
    com.parttime.gateway: DEBUG
    org.springframework.cloud.gateway: INFO