server:
  port: 8086

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://localhost:3307/parttime_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

wechat:
  pay:
    app-id: ${WECHAT_APP_ID:}
    mch-id: ${WECHAT_MCH_ID:}
    api-v3-key: ${WECHAT_API_V3_KEY:}

alipay:
  app-id: ${ALIPAY_APP_ID:}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  public-key: ${ALIPAY_PUBLIC_KEY:}

tax:
  brackets:
    - min: 0
      max: 60000
      rate: 0.00
      deduction: 0
    - min: 60000
      max: 96000
      rate: 0.03
      deduction: 0
    - min: 96000
      max: 204000
      rate: 0.10
      deduction: 2520

callback:
  timeout: 86400