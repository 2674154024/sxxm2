server:
  port: 8089

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:mysql://localhost:3307/parttime_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

admin:
  ip-whitelist:
    - 127.0.0.1
    - 192.168.0.0/16

jwt:
  secret: ${JWT_SECRET:your_jwt_secret}
  expire-seconds: 86400