server:
  port: 8083

spring:
  application:
    name: match-service
  datasource:
    url: jdbc:mysql://localhost:3307/parttime_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

elasticsearch:
  host: localhost
  port: 9200

match:
  algorithm:
    skill-weight: 0.4
    time-weight: 0.3
    distance-weight: 0.3
  max-recommend: 20
  search-radius: 5