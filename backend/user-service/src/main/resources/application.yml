server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://localhost:3307/parttime_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD:parttime@2024}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:parttime@2024}

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_UUID

jwt:
  secret: ${JWT_SECRET:parttime-platform-jwt-secret-2024}
  expire-seconds: 604800

aes:
  secret-key: ${AES_SECRET_KEY:}

credit-score:
  min: 0
  max: 200
  initial: 100
  reward:
    fulfillment: 5
    on-time-salary: 5
  penalty:
    complaint: 20

security:
  min-hourly-wage: 17