server:
  port: 8082

spring:
  application:
    name: job-service
  datasource:
    url: jdbc:mysql://localhost:3307/parttime_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD:parttime@2024}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  redis:
    host: localhost
    port: 6379
    password: ${REDIS_PASSWORD:parttime@2024}

  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

elasticsearch:
  host: localhost
  port: 9200

security:
  min-hourly-wage: 17

sync:
  es:
    incremental-interval: 300000
    full-rebuild-time: "03:00:00"

view-count:
  sync-interval: 600000