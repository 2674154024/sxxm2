server:
  port: 8082

spring:
  application:
    name: job-service
  datasource:
    url: jdbc:mysql://mysql:3306/parttime_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: ${MYSQL_ROOT_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

  redis:
    host: redis
    port: 6379
    password: ${REDIS_PASSWORD:}

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

elasticsearch:
  host: elasticsearch
  port: 9200